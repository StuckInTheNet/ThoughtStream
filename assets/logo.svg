<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="stream" x1="100" y1="200" x2="420" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff6b6b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ee8959" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer subtle ring -->
  <circle cx="256" cy="240" r="140" stroke="#e94560" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>

  <!-- Sound wave bars (center waveform) -->
  <g transform="translate(256, 240)">
    <!-- Center bar -->
    <rect x="-6" y="-60" width="12" height="120" rx="6" fill="url(#wave)"/>
    <!-- Inner bars -->
    <rect x="-38" y="-44" width="12" height="88" rx="6" fill="url(#wave)" opacity="0.9"/>
    <rect x="26" y="-48" width="12" height="96" rx="6" fill="url(#wave)" opacity="0.9"/>
    <!-- Mid bars -->
    <rect x="-70" y="-28" width="12" height="56" rx="6" fill="url(#wave)" opacity="0.7"/>
    <rect x="58" y="-32" width="12" height="64" rx="6" fill="url(#wave)" opacity="0.7"/>
    <!-- Outer bars -->
    <rect x="-102" y="-18" width="12" height="36" rx="6" fill="url(#wave)" opacity="0.5"/>
    <rect x="90" y="-22" width="12" height="44" rx="6" fill="url(#wave)" opacity="0.5"/>
    <!-- Far outer bars -->
    <rect x="-134" y="-10" width="12" height="20" rx="6" fill="url(#wave)" opacity="0.3"/>
    <rect x="122" y="-12" width="12" height="24" rx="6" fill="url(#wave)" opacity="0.3"/>
  </g>

  <!-- Flowing stream line underneath -->
  <path d="M100 370 Q180 345 256 360 Q332 375 412 350" stroke="url(#stream)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M120 390 Q200 365 276 380 Q352 395 432 370" stroke="url(#stream)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="22" font-weight="600" letter-spacing="6" fill="white" opacity="0.85">THOUGHTSTREAM</text>
</svg>
