name: ThoughtStream
options:
  bundleIdPrefix: com.mattfisher
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  ThoughtStream:
    type: application
    platform: iOS
    sources:
      - ThoughtStream
    info:
      path: ThoughtStream/Info.plist
      properties:
        NSSpeechRecognitionUsageDescription: "ThoughtStream needs speech recognition to transcribe your thoughts in real time."
        NSMicrophoneUsageDescription: "ThoughtStream needs microphone access to listen and transcribe your speech."
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mattfisher.ThoughtStream
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: "5.9"
      INFOPLIST_FILE: ThoughtStream/Info.plist
    entitlements:
      path: ThoughtStream/ThoughtStream.entitlements
